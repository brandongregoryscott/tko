name: release

on:
  push:
    tags: ["v*"]

jobs:
  goreleaser:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runner-os: linux
          - os: macos-latest
            runner-os: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install Linux build dependencies
        if: matrix.runner-os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config .goreleaser-${{ matrix.runner-os }}.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
