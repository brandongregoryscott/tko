version: 2

builds:
  - id: linux-amd64
    main: .
    binary: tko
    dir: cmd/tko
    goos: [linux]
    goarch: [amd64]
    skip: '{{ ne .Env.RUNNER_OS "linux" }}'
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
  - id: darwin-amd64
    main: .
    binary: tko
    dir: cmd/tko
    goos: [darwin]
    goarch: [amd64]
    skip: '{{ ne .Env.RUNNER_OS "macos" }}'
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
  - id: darwin-arm64
    main: .
    binary: tko
    dir: cmd/tko
    goos: [darwin]
    goarch: [arm64]
    skip: '{{ ne .Env.RUNNER_OS "macos" }}'
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1

archives:
  - formats: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
